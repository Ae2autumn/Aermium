<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aermium</title>
<style>
  /* ============================================================
     CSS VARIABLES
     Dark mode: add class "dark" to <html>.
     Toggle via menu (E key or swipe-down on page 1).
  ============================================================ */

  :root {
    /* ── Backgrounds ── */
    --bg:             #f5f4f2;
    --bg-card:        #faf9f7;
    --bg-inner:       #f5f4f2;
    --bg-avatar:      #ede9e4;
    --bg-image:       #e8e4df;
    --bg-project:     #e4e0da;

    /* ── Text ── */
    --text-primary:   #2a2a28;
    --text-secondary: #6a6a64;
    --text-muted:     #9a9890;
    --text-faint:     #c8c5be;
    --text-tag:       #a8a5a0;

    /* ── Borders ── */
    --border-strong:  rgba(42,42,40,0.18);
    --border-mid:     rgba(42,42,40,0.14);
    --border-soft:    rgba(42,42,40,0.10);
    --border-tag:     rgba(42,42,40,0.20);
    --border-btn:     rgba(42,42,40,0.25);

    /* ── Interactive states ── */
    --hover-bg:       rgba(42,42,40,0.08);
    --dot-inactive:   rgba(42,42,40,0.12);
    --dot-active:     rgba(42,42,40,0.45);

    /* ── Overlays ── */
    --overlay-bg:         rgba(245,244,242,0.55);
    --overlay-blur-bg:    rgba(245,244,242,0.50);
    --close-btn-bg:       rgba(245,244,242,0.75);
    --stack-overlay-bg:   rgba(245,244,242,0.35);

    /* ── Modals ── */
    --modal-title:       #2a2a28;
    --btn-danger-bg:     #c0392b;
    --btn-danger-hover:  #922b21;

    /* ── Gradients ── */
    --gradient-upper: linear-gradient(to bottom, transparent 40%, rgba(250,249,247,0.85) 100%);
    --slide-gradient: linear-gradient(to bottom, rgba(232,228,223,0) 0%, rgba(232,228,223,1) 55%, rgba(245,244,242,1) 100%);

    /* ── Shadows ── */
    --card-hover-shadow: 0 4px 20px rgba(42,42,40,0.08);

    /* ── Menu ── */
    --menu-bg:            rgba(245,244,242,0.72);
    --menu-card-bg:       #faf9f7;
    --menu-inner-bg:      #f0ede9;
    --menu-slider-bg:     #faf9f7;
    --menu-border:        rgba(42,42,40,0.16);
    --menu-border-inner:  rgba(42,42,40,0.13);
    --menu-border-slider: rgba(42,42,40,0.22);

    /* ── Shared constants ── */
    --font-serif:    'Times New Roman', Times, serif;
    --radius-lg:     12px;
    --radius-md:     8px;
    --radius-sm:     6px;
    --border-hair:   0.5px solid;

    /* ── Spacing ── */
    --space-frame:      15px;          /* 外框容器 padding（panel-box, sheet-frame, gallery-frame 等） */
    --space-header:     12px 18px;     /* section-header / header-bar padding */
    --space-inner:      12px;          /* 内部滚动容器 padding（gallery-inner, blog-list-inner 等） */
    --space-slide-v:    22px;          /* slide / sheet 垂直 padding */
    --space-slide-h:    24px;          /* slide / sheet 水平 padding */
    --space-card:       16px 18px;     /* 列表卡片 padding（blog-list-card, member-upper/lower 等） */
    --space-overlay:    24px;          /* 全屏 overlay / menu-card 外边距 */
    --space-row:        10px 14px;     /* 行级元素 padding（file-row, file-info-row） */
    --space-page-wrap:  40px 24px;     /* page-wrap 外边距（垂直安全距离） */
    --space-dot-h:      2px;           /* dots-row 水平 padding（专用，不随整体缩放） */
    --transition-fade:    opacity 0.3s ease;
    --transition-slide:   transform 0.55s cubic-bezier(0.77,0,0.175,1);
    --transition-snap:    transform 0.3s cubic-bezier(0.77,0,0.175,1);
    --backdrop-overlay:   blur(10px);
    --backdrop-menu:      blur(12px);
    --backdrop-close:     blur(4px);
  }

  :root.dark {
    --bg:             #18171a;
    --bg-card:        #1f1e22;
    --bg-inner:       #18171a;
    --bg-avatar:      #2a2830;
    --bg-image:       #252329;
    --bg-project:     #2e2b35;

    --text-primary:   #e8e6e0;
    --text-secondary: #a8a49c;
    --text-muted:     #706c65;
    --text-faint:     #48453f;
    --text-tag:       #706c65;

    --border-strong:  rgba(230,225,210,0.12);
    --border-mid:     rgba(230,225,210,0.08);
    --border-soft:    rgba(230,225,210,0.06);
    --border-tag:     rgba(230,225,210,0.15);
    --border-btn:     rgba(230,225,210,0.20);

    --hover-bg:       rgba(230,225,210,0.08);
    --dot-inactive:   rgba(230,225,210,0.10);
    --dot-active:     rgba(230,225,210,0.50);

    --overlay-bg:         rgba(24,23,26,0.65);
    --overlay-blur-bg:    rgba(24,23,26,0.55);
    --close-btn-bg:       rgba(24,23,26,0.75);
    --stack-overlay-bg:   rgba(24,23,26,0.45);

    --modal-title:       #e8e6e0;
    --btn-danger-bg:     #a93226;
    --btn-danger-hover:  #7b241c;

    --gradient-upper: linear-gradient(to bottom, transparent 40%, rgba(31,30,34,0.90) 100%);
    --slide-gradient: linear-gradient(to bottom, rgba(37,35,41,0) 0%, rgba(37,35,41,1) 55%, rgba(24,23,26,1) 100%);

    --card-hover-shadow: 0 4px 24px rgba(0,0,0,0.35);

    --menu-bg:            rgba(24,23,26,0.72);
    --menu-card-bg:       #1f1e22;
    --menu-inner-bg:      #2a2830;
    --menu-slider-bg:     #1f1e22;
    --menu-border:        rgba(230,225,210,0.12);
    --menu-border-inner:  rgba(230,225,210,0.09);
    --menu-border-slider: rgba(230,225,210,0.20);
  }

  /* ============================================================
     RESET & BASE
  ============================================================ */
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: var(--font-serif);
    background: var(--bg);
    transition: background 0.4s ease, color 0.4s ease;
  }

  /* ── Hide scrollbars ── */
  .no-scrollbar { scrollbar-width: none; }
  .no-scrollbar::-webkit-scrollbar { display: none; }

  /* ============================================================
     MENU OVERLAY
  ============================================================ */
  #menuOverlay {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--menu-bg);
    backdrop-filter: var(--backdrop-menu);
    -webkit-backdrop-filter: var(--backdrop-menu);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: var(--transition-fade);
  }
  #menuOverlay.visible { opacity: 1; pointer-events: all; }

  .menu-card {
    display: flex; flex-direction: column; align-items: center;
    gap: 12px; padding: var(--space-overlay);
    border: var(--border-hair) var(--menu-border);
    border-radius: var(--radius-lg);
    background: var(--menu-card-bg);
  }

  .theme-group {
    position: relative; display: flex; gap: 2px; padding: 4px;
    border: var(--border-hair) var(--menu-border-inner);
    border-radius: 10px;
    background: var(--menu-inner-bg);
  }

  .theme-slider {
    position: absolute; top: 4px;
    height: 44px; width: 52px;
    border-radius: var(--radius-md);
    background: var(--menu-slider-bg);
    box-shadow: inset 0 0 0 1px var(--menu-border-slider);
    transition: var(--transition-snap), background 0.3s cubic-bezier(0.77,0,0.175,1),
                box-shadow 0.3s cubic-bezier(0.77,0,0.175,1);
    pointer-events: none;
  }

  .theme-btn {
    width: 52px; height: 44px;
    border: none; border-radius: var(--radius-md);
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 1;
    color: var(--text-primary);
    transition: background 0.15s;
  }
  .theme-btn:hover { background: var(--menu-border); }

  .sound-btn {
    width: 168px; height: 44px;
    border-radius: var(--radius-md);
    border: none;
    background: var(--menu-inner-bg); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-primary);
    transition: background 0.15s;
  }
  .sound-btn:hover { background: var(--menu-border); }
  .sound-btn.playing { background: var(--hover-bg); }

  /* ============================================================
     PAGE SYSTEM
  ============================================================ */
  #page-container {
    width: 100%; height: 100vh;
    transition: var(--transition-slide);
  }
  .page {
    width: 100%; height: 100vh;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── Ink blobs (page 1 decoration) ── */
  .ink-blob { position: absolute; pointer-events: none; z-index: 0; }
  .ink-blob.top-left     { top: -40px; left: -40px;   width: 220px; height: 220px; }
  .ink-blob.bottom-right { bottom: -40px; right: -40px; width: 200px; height: 200px; }
  :root.dark .ink-blob { opacity: 0.5; }

  /* ============================================================
     PAGE 1 — LANDING
  ============================================================ */
  .center {
    position: relative; z-index: 1;
    text-align: center; user-select: none;
  }
  .brand {
    font-family: var(--font-serif);
    font-weight: 300;
    font-size: clamp(3rem, 10vw, 7rem);
    color: var(--text-primary);
    letter-spacing: 0.18em;
    line-height: 1;
    min-height: 1.2em;
  }
  .tagline {
    margin-top: 1.4rem;
    font-size: clamp(0.65rem, 1.5vw, 0.78rem);
    color: var(--text-muted); letter-spacing: 0.35em;
    font-weight: 300; text-transform: uppercase;
    opacity: 0; transition: opacity 1.2s ease;
  }
  .tagline.visible { opacity: 1; }
  .get-started {
    font-family: var(--font-serif);
    font-weight: 300;
    font-size: clamp(3rem, 10vw, 7rem);
    color: var(--text-primary); letter-spacing: 0.18em;
    background: none; border: none; cursor: pointer; padding: 0;
    display: none;
  }
  .get-started:hover { color: var(--text-secondary); }

  /* ============================================================
     SHARED LAYOUT — page-wrap + panel-box
  ============================================================ */
  .page-wrap {
    position: relative; z-index: 1;
    width: 100%; height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: var(--space-page-wrap);
  }
  .panel-box {
    width: 100%; max-width: 420px;
    height: 100%; max-height: 580px;
    border: var(--border-hair) var(--border-strong);
    border-radius: var(--radius-lg);
    background: var(--bg-card);
    display: flex; flex-direction: column;
    padding: var(--space-frame);
    overflow: hidden;
  }

  /* ============================================================
     SHARED: DOTS / PROGRESS BARS
     Unified from blog-dots-row, event-dots-row, member-dots-wrap
  ============================================================ */
  .dots-row {
    flex-shrink: 0;
    display: flex; gap: 4px;
    height: 10px;
    align-items: center;
    padding: 0 var(--space-dot-h);
  }
  .dot-bar {
    flex: 1; height: 2px;
    background: var(--dot-inactive);
    border-radius: 2px;
    cursor: pointer;
    transition: background 0.3s;
  }
  .dot-bar.active { background: var(--dot-active); }

  /* ── Collapsible progress row (page 3 stack) ── */
  .stack-progress-row {
    flex-shrink: 0;
    display: flex; gap: 4px;
    height: 0; align-items: center;
    padding: 0 var(--space-dot-h); overflow: hidden;
    opacity: 0; margin-bottom: 0;
    transition: height 0.3s ease, opacity 0.3s ease, margin-bottom 0.3s ease;
  }
  .stack-progress-row.visible { height: 10px; opacity: 1; margin-bottom: 14px; }

  /* ============================================================
     SHARED: SECTION HEADER (blog "Writings", event "近期活动")
  ============================================================ */
  .section-header {
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    border: var(--border-hair) var(--border-mid);
    border-radius: var(--radius-md);
    background: var(--bg-inner);
    padding: var(--space-header);
    font-family: var(--font-serif);
    font-weight: 400;
    font-size: 1.3rem;
    color: var(--text-primary);
    letter-spacing: 0.1em;
  }

  /* ============================================================
     SHARED: CAROUSEL TRACK
     Used by pages 2, 4 (blog), 6 (event)
  ============================================================ */
  .carousel-track-outer {
    flex: 1;
    border: var(--border-hair) var(--border-mid);
    border-radius: var(--radius-md);
    background: var(--bg-inner);
    overflow: hidden;
    position: relative;
    min-height: 0;
  }
  .carousel-track {
    display: flex; height: 100%;
    transition: var(--transition-slide);
    will-change: transform;
  }
  .carousel-slide {
    min-width: 100%; height: 100%;
    display: flex; flex-direction: column;
    box-sizing: border-box;
  }

  /* ============================================================
     SHARED: ACTION BUTTON (View / Read)
  ============================================================ */
  .action-btn {
    font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--text-secondary); font-weight: 300;
    border: var(--border-hair) var(--border-btn);
    padding: 6px 18px; border-radius: var(--radius-sm);
    background: none; cursor: pointer;
    transition: background 0.2s, color 0.2s;
    font-family: var(--font-serif);
  }
  .action-btn:hover { background: var(--hover-bg); color: var(--text-primary); }

  /* ============================================================
     PAGE 2 — PROJECTS CAROUSEL
  ============================================================ */
  #page2 { flex-direction: column; }

  .project-carousel-box {
    cursor: grab; user-select: none;
    flex-shrink: 0;
    position: relative;
    gap: 10px;
  }
  .project-carousel-box:active { cursor: grabbing; }

  /* The track-outer for page 2 has special nested structure */
  .project-track-outer {
    flex: 1; min-height: 0;
    overflow: hidden;
    border-radius: var(--radius-sm);
    position: relative;
  }

  .slide-inner {
    width: 100%; height: 100%;
    border: var(--border-hair) var(--border-mid);
    border-radius: var(--radius-sm);
    background: var(--bg-inner);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .slide-image {
    flex: 0 0 32%;
    background: var(--bg-image);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .slide-image::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 70%;
    background: var(--slide-gradient);
    pointer-events: none;
  }
  .slide-image span {
    font-size: 0.6rem; color: var(--text-faint);
    letter-spacing: 0.25em; text-transform: uppercase;
    position: relative; z-index: 1;
  }
  .slide-content {
    flex: 1; display: flex; flex-direction: column;
    padding: var(--space-slide-v) var(--space-slide-h) calc(var(--space-slide-v) - 4px);
    overflow: hidden; min-height: 0;
    margin-top: -18px; position: relative; z-index: 1;
  }
  .slide-number {
    font-size: 0.6rem; letter-spacing: 0.3em;
    color: var(--text-faint); font-weight: 300; text-transform: uppercase;
    margin-bottom: 14px;
  }
  .slide-title {
    font-family: var(--font-serif); font-weight: 300;
    font-size: clamp(1.4rem, 3vw, 2.2rem);
    color: var(--text-primary); letter-spacing: 0.06em;
    margin-bottom: 12px;
  }
  .slide-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .slide-tag {
    font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-tag); font-weight: 300;
    border: var(--border-hair) var(--border-mid);
    padding: 3px 10px; border-radius: var(--radius-sm);
  }
  .slide-desc {
    font-size: 0.73rem; color: var(--text-muted);
    letter-spacing: 0.06em; font-weight: 300;
    line-height: 1.9; flex: 1; overflow-y: auto; min-height: 0;
  }
  .slide-footer { display: flex; justify-content: flex-end; padding-top: 14px; flex-shrink: 0; }

  /* Page-2 carousel dots (horizontal bar style) */
  .carousel-dots {
    display: flex; gap: 4px; flex-shrink: 0;
  }
  /* Reuse .dot-bar for the dots inside .carousel-dots */

  /* ============================================================
     PAGE 3 — STACK VIEWER
  ============================================================ */
  #page3 { flex-direction: column; }

  .stack-outer { gap: 0; }

  .stack-box {
    flex: 1; min-height: 0;
    border: var(--border-hair) var(--border-mid);
    border-radius: var(--radius-md);
    background: var(--bg-inner);
    position: relative; overflow: hidden;
    cursor: grab; user-select: none;
  }
  .stack-box:active { cursor: grabbing; }

  .stack-cards { width: 100%; height: 100%; position: relative; }

  .stack-card {
    position: absolute;
    width: 65%; aspect-ratio: 3/4;
    border: var(--border-hair) var(--border-strong);
    border-radius: var(--radius-md);
    background: var(--bg-avatar);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: box-shadow 0.2s;
    overflow: hidden;
  }
  .stack-card:hover { box-shadow: var(--card-hover-shadow); }
  .stack-card span {
    font-size: 0.6rem; color: var(--text-faint);
    letter-spacing: 0.2em; text-transform: uppercase;
  }
  .stack-cards.list-mode {
    display: flex; flex-direction: row; align-items: center;
    gap: 10px; padding: var(--space-slide-v);
    overflow-x: auto; overflow-y: hidden;
    height: 100%; width: max-content; min-width: 100%;
    scrollbar-width: none;
  }
  .stack-cards.list-mode::-webkit-scrollbar { display: none; }
  .stack-cards.list-mode .stack-card {
    position: relative !important;
    width: 120px !important; height: 160px !important;
    aspect-ratio: unset !important;
    border-radius: var(--radius-sm) !important;
    transform: none !important;
    top: unset !important; left: unset !important;
    rotate: unset !important;
    flex-shrink: 0;
  }
  .stack-overlay {
    position: absolute; inset: 0;
    border-radius: var(--radius-lg);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    background: var(--stack-overlay-bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; cursor: pointer;
    opacity: 1; transition: opacity 0.7s ease;
  }
  .stack-overlay.hidden { opacity: 0; pointer-events: none; }
  .stack-overlay span {
    font-size: 0.72rem; letter-spacing: 0.28em;
    color: var(--text-secondary); font-weight: 300; text-transform: uppercase;
  }

  /* ============================================================
     PAGE 4 — BLOG
  ============================================================ */
  #page4 { flex-direction: column; }

  .blog-box { gap: 10px; }

  .blog-slide {
    padding: var(--space-slide-v) var(--space-slide-h);
    gap: 0;
  }
  .blog-meta-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px; flex-shrink: 0;
  }
  .blog-date {
    font-size: 0.58rem; letter-spacing: 0.28em;
    color: var(--text-faint); font-weight: 300; text-transform: uppercase;
  }
  .blog-dot-sep {
    width: 3px; height: 3px; border-radius: 50%;
    background: var(--text-faint); opacity: 0.4; flex-shrink: 0;
  }
  .blog-category {
    font-size: 0.55rem; letter-spacing: 0.22em;
    text-transform: uppercase; font-weight: 300; color: var(--text-tag);
    border: var(--border-hair) var(--border-mid);
    padding: 2px 9px; border-radius: 5px;
  }
  .blog-title {
    font-family: var(--font-serif); font-weight: 300;
    font-size: clamp(1.25rem, 3.5vw, 1.9rem);
    color: var(--text-primary); letter-spacing: 0.05em;
    line-height: 1.35; margin-bottom: 14px; flex-shrink: 0;
  }
  .blog-divider {
    flex-shrink: 0; height: 0.5px;
    background: var(--border-soft); margin-bottom: 14px;
  }
  .blog-excerpt {
    font-size: 0.73rem; color: var(--text-muted);
    font-weight: 300; line-height: 1.95; letter-spacing: 0.04em;
    overflow-y: auto; flex: 1; min-height: 0;
  }
  .blog-footer {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 14px; flex-shrink: 0;
  }
  .blog-read-time {
    font-size: 0.57rem; letter-spacing: 0.22em;
    color: var(--text-faint); font-weight: 300; text-transform: uppercase;
  }

  /* ============================================================
     PAGE 5 — DOC VIEWER
  ============================================================ */
  #page5 { flex-direction: column; }

  .doc-content {
    flex: 1;
    border: var(--border-hair) var(--border-mid);
    border-radius: var(--radius-md);
    background: var(--bg-inner);
    overflow-y: auto; min-height: 0;
  }
  .doc-text {
    padding: var(--space-slide-v) var(--space-slide-h);
    font-size: 0.75rem; color: var(--text-secondary);
    font-weight: 300; line-height: 1.9; letter-spacing: 0.04em;
  }
  .doc-text h1 {
    font-family: var(--font-serif); font-weight: 300; font-size: 1.4rem;
    color: var(--text-primary); letter-spacing: 0.06em; margin-bottom: 14px;
  }
  .doc-text p { margin-bottom: 10px; }
  .doc-text p:last-child { margin-bottom: 0; }
  .doc-tabs {
    flex-shrink: 0; height: 52px;
    border: var(--border-hair) var(--border-mid);
    border-radius: var(--radius-md);
    background: var(--bg-inner);
    display: flex; align-items: center; gap: 6px;
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  .doc-tab-spacer { flex-shrink: 0; width: var(--tab-spacer, 50%); }
  .doc-tab {
    flex-shrink: 0;
    font-size: 0.6rem; letter-spacing: 0.18em;
    text-transform: uppercase; font-weight: 300; color: var(--text-faint);
    padding: 5px 12px; border-radius: var(--radius-sm);
    border: var(--border-hair) transparent;
    cursor: pointer; white-space: nowrap;
    transition: color 0.25s, border-color 0.25s, background 0.25s;
  }
  .doc-tab.active { color: var(--text-primary); border-color: var(--border-btn); }
  .doc-tab:hover:not(.active) { color: var(--text-muted); }

  /* ============================================================
     PAGE 6 — EVENTS
  ============================================================ */
  #page6 { flex-direction: column; }

  .event-box { gap: 10px; }

  .event-slide {
    padding: var(--space-slide-v) var(--space-slide-h);
    gap: 10px;
  }
  .event-date {
    font-size: 0.6rem; letter-spacing: 0.3em;
    color: var(--text-faint); font-weight: 300; text-transform: uppercase;
  }
  .event-title {
    font-family: var(--font-serif); font-weight: 300;
    font-size: clamp(1.3rem, 4vw, 1.9rem);
    color: var(--text-primary); letter-spacing: 0.06em;
  }
  .event-location {
    font-size: 0.65rem; letter-spacing: 0.18em;
    color: var(--text-tag); font-weight: 300; text-transform: uppercase;
  }
  .event-desc {
    font-size: 0.73rem; color: var(--text-muted);
    font-weight: 300; line-height: 1.9; letter-spacing: 0.04em;
    margin-top: 6px; overflow-y: auto; flex: 1;
  }

  /* ============================================================
     PAGE 7 — MEMBERS
  ============================================================ */
  #page7 { flex-direction: column; }

  .member-box { gap: 10px; }

  .member-upper {
    flex-shrink: 0; display: flex; gap: 16px;
    border: var(--border-hair) var(--border-mid);
    border-radius: var(--radius-md);
    background: var(--bg-inner);
    padding: var(--space-card); align-items: flex-start;
  }
  .member-avatar-box {
    flex-shrink: 0; width: 78px; height: 78px;
    border: var(--border-hair) var(--border-strong);
    border-radius: var(--radius-sm);
    background: var(--bg-avatar);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .member-avatar-box:hover { opacity: 0.82; }
  .member-avatar-box span {
    font-size: 0.5rem; color: var(--text-faint);
    letter-spacing: 0.16em; text-transform: uppercase;
  }
  .member-info-col {
    flex: 1; display: flex; flex-direction: column; gap: 5px; min-width: 0;
  }
  .member-name {
    font-family: var(--font-serif); font-weight: 300;
    font-size: clamp(1rem, 3vw, 1.3rem);
    color: var(--text-primary); letter-spacing: 0.08em; line-height: 1.2;
  }
  .member-role {
    font-size: 0.56rem; letter-spacing: 0.26em;
    color: var(--text-faint); font-weight: 300; text-transform: uppercase;
  }
  .member-quote {
    font-family: var(--font-serif); font-style: italic;
    font-size: clamp(0.65rem, 1.8vw, 0.76rem);
    color: var(--text-secondary); letter-spacing: 0.03em; line-height: 1.8;
    border-left: 1px solid var(--border-strong);
    padding-left: 10px; margin-top: 5px;
  }
  .member-lower {
    flex: 1; display: flex; flex-direction: column;
    border: var(--border-hair) var(--border-mid);
    border-radius: var(--radius-md);
    background: var(--bg-inner);
    padding: var(--space-card); min-height: 0; overflow: hidden;
  }
  .member-section-label {
    font-size: 0.54rem; letter-spacing: 0.32em;
    color: var(--text-faint); font-weight: 300; text-transform: uppercase;
    margin-bottom: 10px; flex-shrink: 0;
  }
  .member-bio {
    font-size: 0.72rem; color: var(--text-muted);
    font-weight: 300; line-height: 1.9; letter-spacing: 0.04em;
    overflow-y: auto; flex: 1; min-height: 0;
  }

  /* ============================================================
     PAGE 8 — CONTACT / FILES / REDEEM
  ============================================================ */
  #page8 { flex-direction: column; }

  .contact-panel {
    display: flex; flex-direction: column;
    gap: 8px; padding: var(--space-frame);
    height: 100%; max-height: 580px;
    transition: max-height 0.4s cubic-bezier(0.77,0,0.175,1);
  }
  .contact-panel.redeem-mode { height: auto; max-height: none; }

  /* Tab switcher */
  .tab-switcher {
    flex-shrink: 0; position: relative;
    display: flex; padding: 4px;
    border: var(--border-hair) var(--border-mid);
    border-radius: 10px; background: var(--bg-inner);
  }
  .tab-slider {
    position: absolute; top: 4px; left: 4px;
    height: 36px; border-radius: 7px;
    background: var(--bg-card);
    box-shadow: inset 0 0 0 0.5px var(--border-strong);
    transition: var(--transition-snap), width 0.3s cubic-bezier(0.77,0,0.175,1);
    pointer-events: none;
  }
  .tab-btn {
    flex: 1; height: 36px;
    border: none; border-radius: 7px;
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    position: relative; z-index: 1;
    color: var(--text-muted); transition: color 0.2s;
  }
  .tab-btn.active { color: var(--text-primary); }
  .tab-btn:hover:not(.active) { color: var(--text-secondary); }

  /* Pane body */
  .pane-body {
    flex: 1; min-height: 0; position: relative; overflow: hidden;
    border: var(--border-hair) var(--border-mid);
    border-radius: var(--radius-md); background: var(--bg-inner);
  }
  .pane-body.redeem-mode { flex: none; height: auto; overflow: visible; }

  .pane {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    opacity: 0; pointer-events: none;
    transition: var(--transition-fade), var(--transition-snap);
  }
  .pane.active { opacity: 1; pointer-events: all; transform: translateX(0) !important; }
  .pane-body.redeem-mode .pane { display: none; }
  .pane-body.redeem-mode .pane.active {
    display: flex; position: relative; inset: unset;
  }

  /* Contact cards */
  .contact-col {
    flex: 1; display: flex; flex-direction: column;
    gap: 8px; padding: var(--space-inner);
  }
  .contact-card {
    flex: 1; display: flex; flex-direction: column;
    align-items: flex-start; justify-content: center; gap: 4px;
    padding: 0 18px;
    border: var(--border-hair) var(--border-mid);
    border-radius: var(--radius-md); background: var(--bg-card);
    text-decoration: none; color: inherit; cursor: pointer;
    transition: background 0.2s; min-height: 0;
  }
  .contact-card:hover { background: var(--bg-avatar); }
  .contact-label {
    font-size: 0.58rem; letter-spacing: 0.26em;
    color: var(--text-faint); text-transform: uppercase; font-weight: 300;
  }
  .contact-value {
    font-family: var(--font-serif);
    font-size: clamp(0.85rem, 2.5vw, 1.1rem);
    color: var(--text-primary); letter-spacing: 0.05em; font-weight: 300;
  }

  /* File list */
  .file-list {
    position: absolute; inset: 0; overflow-y: auto;
    display: flex; flex-direction: column; gap: 6px; padding: var(--space-inner);
  }
  .file-row {
    flex-shrink: 0; display: flex; align-items: center; gap: 10px;
    padding: var(--space-row);
    border: var(--border-hair) var(--border-mid);
    border-radius: var(--radius-md); background: var(--bg-card);
    transition: background 0.15s;
  }
  .file-row:hover { background: var(--bg-avatar); }
  .file-icon {
    flex-shrink: 0; width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-muted); cursor: pointer; transition: color 0.15s;
  }
  .file-icon:hover { color: var(--text-secondary); }
  .file-meta { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
  .file-name {
    font-size: 0.72rem; color: var(--text-primary);
    letter-spacing: 0.04em; font-weight: 300;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .file-size {
    font-size: 0.57rem; color: var(--text-faint);
    letter-spacing: 0.16em; font-weight: 300;
  }
  .file-view-btn {
    flex-shrink: 0;
    font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-secondary); font-weight: 300;
    border: var(--border-hair) var(--border-btn);
    padding: 5px 12px; border-radius: var(--radius-sm);
    background: none; cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .file-view-btn:hover { background: var(--hover-bg); color: var(--text-primary); }

  /* File info inside modal */
  .file-info {
    width: 100%; display: flex; flex-direction: column;
    border: var(--border-hair) var(--border-mid);
    border-radius: var(--radius-md); background: var(--bg-inner); overflow: hidden;
  }
  .file-info-row {
    display: flex; justify-content: space-between; align-items: baseline;
    border-bottom: var(--border-hair) var(--border-soft);
    padding: var(--space-row); gap: 12px;
  }
  .file-info-row:last-child { border-bottom: none; }
  .file-info-key {
    font-size: 0.58rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--text-faint); font-weight: 300; flex-shrink: 0;
  }
  .file-info-val {
    font-size: 0.68rem; color: var(--text-secondary);
    letter-spacing: 0.04em; font-weight: 300;
    text-align: right; word-break: break-all;
  }

  /* Redeem pane */
  .redeem-wrap {
    display: flex; flex-direction: column;
    gap: 8px; padding: var(--space-frame); position: relative;
  }
  .redeem-toast-stack {
    position: absolute; top: var(--space-frame); right: var(--space-frame);
    display: flex; flex-direction: column;
    align-items: flex-end; gap: 5px;
    z-index: 10; pointer-events: none;
  }
  .redeem-toast {
    background: var(--bg-card);
    border: var(--border-hair) var(--border-mid);
    border-radius: var(--radius-md);
    padding: 8px 13px; color: var(--text-secondary);
    font-size: 0.7rem; letter-spacing: 0.06em;
    white-space: nowrap; pointer-events: none;
    opacity: 0; transform: translateX(20px);
    transition: opacity 0.25s, transform 0.3s;
  }
  .redeem-toast.enter { opacity: 1; transform: translateX(0); }
  .redeem-toast.exit  { opacity: 0; transform: translateX(20px); }
  .redeem-toast--error   { border-color: rgba(192,57,43,0.5);  color: #e74c3c; }
  .redeem-toast--warning { border-color: rgba(180,130,0,0.45); color: #c49a00; }
  .redeem-toast--success { border-color: rgba(39,174,96,0.45); color: #27ae60; }

  /* ── Global toast container (viewport top-right, above modals) ── */
  #globalToastStack {
    position: fixed; top: 20px; right: 20px;
    display: flex; flex-direction: column;
    align-items: flex-end; gap: 6px;
    z-index: 1050; pointer-events: none;
  }
  .redeem-top {
    min-height: 150px;
    border: var(--border-hair) var(--border-mid);
    border-radius: var(--radius-md);
    background: #c1705a;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .redeem-gift { height: 70%; max-height: 100px; width: auto; pointer-events: none; }
  .redeem-input-row {
    flex-shrink: 0; height: 44px;
    border: var(--border-hair) var(--border-mid);
    border-radius: var(--radius-md); background: var(--bg-avatar);
    display: flex; align-items: center; justify-content: center; padding: 0 14px;
    transition: border-color 0.25s, background 0.25s;
    -webkit-tap-highlight-color: transparent;
    /* [修改] position:relative 确保 shimmer 光效以整个输入框为基准定位，
       而不是跑到外层容器上 */
    position: relative;
    overflow: hidden; /* 同时裁掉超出输入框边界的光效 */
  }
  .redeem-input-row.input-error {
    border-color: rgba(192,57,43,0.7); animation: shake 0.4s ease;
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    15%     { transform: translateX(-5px); }
    35%     { transform: translateX(5px); }
    55%     { transform: translateX(-4px); }
    75%     { transform: translateX(4px); }
    90%     { transform: translateX(-2px); }
  }
  .redeem-input {
    width: 100%; background: transparent; border: none; outline: none;
    color: var(--text-primary);
    font-size: 0.75rem; font-family: var(--font-serif);
    letter-spacing: 0.1em; text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .redeem-input::placeholder { color: var(--text-faint); }
  .redeem-input:disabled { opacity: 0.4; cursor: not-allowed; }
  .redeem-result {
    color: var(--text-primary);
    font-size: 0.75rem; font-family: var(--font-serif);
    letter-spacing: 0.1em; user-select: none; display: none;
  }
  .redeem-check { display: none; }
  .redeem-input-row.result-mode { cursor: pointer; }
  .redeem-input-row.result-mode .redeem-input { pointer-events: none; }
  .redeem-input-row.copied {
    border-color: rgba(92,184,126,0.6);
    background: rgba(92,184,126,0.06);
    cursor: default;
  }
  .redeem-input-row.copied .redeem-check { display: block; color: #5cb87e; }

  /* ── Redeem pending state ── */
  .redeem-input-row.pending {
    /* [修改] 边框和背景颜色调浅，视觉更柔和 */
    border-color: rgba(210, 160, 40, 0.45);   /* 原 0.7，改为 0.45 */
    background: rgba(210, 160, 40, 0.07);     /* 原 0.12，改为 0.07 */
    /* overflow:hidden 已移到 .redeem-input-row 基础样式，此处无需重复 */
    cursor: not-allowed;
  }
  .redeem-input-row.pending .redeem-input {
    /* [修改] 文字颜色调亮，提升可读性 */
    color: rgba(200, 155, 40, 1);             /* 原 rgba(180,130,20,0.85)，不透明度提满 */
    pointer-events: none;
  }
  :root.dark .redeem-input-row.pending .redeem-input {
    /* [修改] dark 模式文字同样调亮 */
    color: rgba(245, 205, 80, 1);             /* 原 rgba(230,185,60,0.9)，饱和度/亮度略升 */
  }

  /* Glass sweep shimmer
     ─────────────────────────────────────────────────────────────
     [修改] 光效覆盖整个输入框：.redeem-input-row 已加 position:relative + overflow:hidden，
            shimmer 用 inset:0/width:100% 覆盖完整宽度，沿 X 轴平移实现扫光。
     [修改] 颜色调浅：亮光中心透明度从 0.45 降到 0.22（light），0.3 降到 0.15（dark）。
  ─────────────────────────────────────────────────────────────── */
  .redeem-shimmer {
    position: absolute;
    inset: 0;
    width: 100%;
    background: linear-gradient(
      105deg,
      transparent 38%,
      rgba(255, 220, 0, 0.55) 50%,     /* [修改] 亮黄色，光束收窄至 38%~62% */
      transparent 62%
    );
    pointer-events: none;
    animation: redeemSweep 1.6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  }
  :root.dark .redeem-shimmer {
    background: linear-gradient(
      105deg,
      transparent 38%,
      rgba(255, 225, 20, 0.45) 50%,    /* [修改] dark 模式：亮黄，光束同样收窄 */
      transparent 62%
    );
  }
  @keyframes redeemSweep {
    /* [修改] 改用 translateX 驱动，确保光效始终在 .redeem-input-row 内扫过 */
    0%   { transform: translateX(-120%); }
    100% { transform: translateX(120%); }
  }

  /* ── 如何对接真实后端 ────────────────────────────────────────────
     找到下方 JS 函数 mockBackendRedeem()，将其替换为真实 fetch 请求，例如：

       async function mockBackendRedeem(val) {
         const res = await fetch('/api/redeem', {
           method: 'POST',
           headers: { 'Content-Type': 'application/json' },
           body: JSON.stringify({ code: val })
         });
         return res.json(); // 需返回 { ok: bool, result?: string, toast: string }
       }

     接口契约：POST /api/redeem → { ok: true, result: "兑换内容", toast: "提示文字" }
                              或  { ok: false, toast: "错误提示" }
  ──────────────────────────────────────────────────────────────── */

  /* ============================================================
     PAGE 9 — FINAL / OUTRO
  ============================================================ */
  #page9 { flex-direction: column; }

  .final-wrap {
    text-align: center; user-select: none;
    display: flex; flex-direction: column; align-items: center; gap: 0;
  }
  .final-brand {
    font-family: var(--font-serif); font-weight: 400;
    font-size: clamp(3rem, 10vw, 7rem);
    color: var(--text-primary); letter-spacing: 0.18em;
    line-height: 1; min-height: 1.2em;
  }
  .final-suffix {
    font-family: var(--font-serif); font-weight: 400;
    font-size: clamp(1rem, 3vw, 1.6rem);
    color: var(--text-primary); letter-spacing: 0.22em;
    min-height: 1.6em; margin-top: 0.3em;
  }
  .final-by {
    font-size: 0.65rem; letter-spacing: 0.35em;
    color: var(--text-faint); font-weight: 400; text-transform: uppercase;
    margin-top: 2.4rem; min-height: 1.2em;
  }
  .final-name {
    font-family: var(--font-serif);
    font-size: 0.9rem; letter-spacing: 0.2em;
    color: var(--text-muted); font-weight: 400;
    margin-top: 0.5rem; min-height: 1.4em;
  }
  .cursor-blink {
    display: inline-block; color: var(--text-primary);
    animation: blink 1s step-end infinite;
    font-weight: 300; margin-left: 1px;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ============================================================
     OVERLAYS: PROJECT / BLOG / ABOUT (shared .sheet-overlay)
  ============================================================ */
  .sheet-overlay {
    position: fixed; inset: 0; z-index: 999;
    display: flex; align-items: center; justify-content: center;
    padding: var(--space-overlay);
    backdrop-filter: var(--backdrop-overlay);
    -webkit-backdrop-filter: var(--backdrop-overlay);
    background: var(--overlay-bg);
    opacity: 0; pointer-events: none;
    transition: var(--transition-fade);
  }
  .sheet-overlay.visible { opacity: 1; pointer-events: all; }

  .sheet-frame {
    width: 100%; max-width: 420px;
    height: 88vh; max-height: 640px;
    border: var(--border-hair) var(--border-strong);
    border-radius: var(--radius-lg); background: var(--bg-card);
    padding: var(--space-frame);
    display: flex; flex-direction: column;
    transform: translateY(12px) scale(0.98);
    transition: transform 0.35s cubic-bezier(0.77,0,0.175,1);
    overflow: hidden;
  }
  .sheet-overlay.visible .sheet-frame { transform: translateY(0) scale(1); }

  .sheet-inner {
    width: 100%; flex: 1; min-height: 0;
    background: var(--bg-inner);
    border: var(--border-hair) var(--border-mid);
    border-radius: var(--radius-md);
    display: flex; flex-direction: column;
    overflow: hidden; position: relative;
  }
  .sheet-close {
    position: absolute; top: 12px; right: 12px; z-index: 10;
    width: 28px; height: 28px; border-radius: 4px;
    background: var(--close-btn-bg); border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text-primary);
    backdrop-filter: var(--backdrop-close);
    -webkit-backdrop-filter: var(--backdrop-close);
    transition: background 0.15s;
  }
  .sheet-close:hover { background: var(--overlay-blur-bg); }

  .sheet-header {
    flex-shrink: 0; height: 200px;
    position: relative; overflow: hidden;
  }
  .sheet-image-bg {
    position: absolute; inset: 0;
    background: var(--bg-project);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .sheet-image-bg:hover { opacity: 0.88; }
  .sheet-image-bg span {
    font-size: 0.6rem; color: var(--text-faint);
    letter-spacing: 0.25em; text-transform: uppercase;
  }
  .sheet-header-content {
    position: relative; z-index: 1; height: 100%;
    display: flex; flex-direction: column; justify-content: flex-end;
    padding: var(--space-card);
    background: var(--gradient-upper);
  }
  .sheet-date {
    font-size: 0.6rem; letter-spacing: 0.28em;
    color: var(--text-tag); text-transform: uppercase; margin-bottom: 6px;
  }
  .sheet-title {
    font-family: var(--font-serif); font-size: clamp(1.2rem, 4vw, 1.7rem);
    font-weight: 400; color: var(--text-primary);
    letter-spacing: 0.06em; line-height: 1.3;
  }
  .sheet-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .sheet-tag {
    font-size: 0.58rem; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--text-tag);
    border: var(--border-hair) var(--border-tag);
    padding: 2px 8px; border-radius: var(--radius-sm);
    background: rgba(250,249,247,0.7);
  }
  :root.dark .sheet-tag { background: rgba(24,23,26,0.55); }
  .sheet-body {
    flex: 1; overflow-y: auto; padding: var(--space-slide-v) var(--space-slide-h);
  }
  .sheet-content {
    font-size: 0.75rem; color: var(--text-secondary);
    font-weight: 400; line-height: 2; letter-spacing: 0.04em;
  }
  .sheet-content p { margin-bottom: 12px; }
  .sheet-content p:last-child { margin-bottom: 0; }

  /* ============================================================
     MODALS (shared .modal-overlay)
  ============================================================ */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: center; padding: var(--space-overlay);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    background: var(--overlay-blur-bg);
    opacity: 0; pointer-events: none; transition: var(--transition-fade);
  }
  .modal-overlay.visible { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--bg-card); border: var(--border-hair) var(--border-strong);
    border-radius: var(--radius-lg); padding: 28px 24px 20px;
    width: 100%; max-width: 320px;
    display: flex; flex-direction: column; align-items: center; gap: 20px;
    transform: translateY(8px); transition: transform 0.3s ease;
  }

<script>
/* ============================================================
   IMAGE HELPER
   imgOrPlaceholder(src, alt?, cls?) — 有 src 则渲染 <img>，
   无 src 则渲染原占位 <span>，永不裂图。
============================================================ */
function imgOrPlaceholder(src, alt, cls) {
  if (src) {
    return `<img src="${src}" alt="${alt || ''}" class="${cls || ''}"
      style="width:100%;height:100%;object-fit:cover;display:block;">`;
  }
  return `<span>${alt || 'Image'}</span>`;
}

/* 将图片 URL 应用到一个"背景容器"元素上（用于 sheet-image-bg、stack card 等） */
function applyBgImage(el, src, placeholder) {
  const span = el.querySelector('span');
  if (src) {
    el.style.backgroundImage    = `url(${src})`;
    el.style.backgroundSize     = 'cover';
    el.style.backgroundPosition = 'center';
    if (span) span.style.display = 'none';
  } else {
    el.style.backgroundImage = '';
    if (span) { span.style.display = ''; span.textContent = placeholder || 'Image'; }
  }
}

/* ============================================================
   SHARED UTILITIES
============================================================ */

function rand(a, b) { return a + Math.random() * (b - a); }

/**
 * createDots(container, count, dotClass, onClick?)
 * 创建进度点，追加到 container，返回 setActive(idx) 函数。
 */
function createDots(container, count, dotClass, onClick) {
  for (let i = 0; i < count; i++) {
    const d = document.createElement('div');
    d.className = dotClass + (i === 0 ? ' active' : '');
    if (onClick) d.addEventListener('click', () => onClick(i));
    container.appendChild(d);
  }
  return idx => container.querySelectorAll('.' + dotClass)
    .forEach((d, i) => d.classList.toggle('active', i === idx));
}

/**
 * createCarousel({ trackEl, dotsContainer, dotClass, dragEl, interval? })
 * 封装轮播逻辑，返回 { go, startAuto, stopAuto, stopByUser, getCur }。
 */
function createCarousel({ trackEl, dotsContainer, dotClass, dragEl, interval = 3500, total }) {
  // total 由调用方从数据数组传入，是唯一数据来源
  let cur = 0, timer = null, userStopped = false;

  // 自动生成 dots，数量与 total 严格同步
  if (dotsContainer && total) {
    dotsContainer.innerHTML = '';
    for (let i = 0; i < total; i++) {
      const d = document.createElement('div');
      d.className = dotClass + (i === 0 ? ' active' : '');
      d.addEventListener('click', () => { stopByUser(); go(i); });
      dotsContainer.appendChild(d);
    }
  }

  const setDotActive = dotsContainer
    ? idx => dotsContainer.querySelectorAll('.' + dotClass)
        .forEach((d, i) => d && d.classList.toggle('active', i === idx))
    : () => {};

  function go(n) {
    cur = (n + total) % total;
    trackEl.style.transform = `translateX(-${cur * 100}%)`;
    setDotActive(cur);
  }
  function startAuto() {
    if (userStopped) return;
    clearInterval(timer);
    timer = setInterval(() => go(cur + 1), interval);
  }
  function stopAuto()   { clearInterval(timer); timer = null; }
  function stopByUser() { userStopped = true; stopAuto(); }

  /* Drag / swipe binding */
  let dragX = null;
  dragEl.addEventListener('mousedown',  e => { dragX = e.clientX; });
  dragEl.addEventListener('mouseup',    e => {
    if (dragX === null) return;
    const dx = e.clientX - dragX; dragX = null;
    if (Math.abs(dx) > 40) { stopByUser(); go(cur + (dx < 0 ? 1 : -1)); }
  });
  dragEl.addEventListener('mouseleave', () => { dragX = null; });
  dragEl.addEventListener('touchstart', e => { dragX = e.touches[0].clientX; }, { passive: true });
  dragEl.addEventListener('touchend',   e => {
    if (dragX === null) return;
    const dx = e.changedTouches[0].clientX - dragX; dragX = null;
    if (Math.abs(dx) > 40) { stopByUser(); go(cur + (dx < 0 ? 1 : -1)); }
  }, { passive: true });

  return { go, startAuto, stopAuto, stopByUser, getCur: () => cur };
}

    excerpt: '选择字体从来不只是审美问题。不同的字体在视觉上承载着不同的时间感：有些字体让人觉得正在发生，有些则唤起某种已经结束的东西。<br><br>当我们为文化机构设计出版物时，会刻意选用带有历史感的衬线字体——不是为了复古，而是为了让读者感受到那种沉淀的重量。设计是在时间里工作的。',
    content: `<p>选择字体从来不只是审美问题。不同的字体在视觉上承载着不同的时间感：有些字体让人觉得正在发生，有些则唤起某种已经结束的东西。</p><p>当我们为文化机构设计出版物时，会刻意选用带有历史感的衬线字体——不是为了复古，而是为了让读者感受到那种沉淀的重量。设计是在时间里工作的。</p><p>汉字的情况更为复杂。宋体承载的历史超过五百年，而黑体不过百年出头。在选择字体的那一刻，你其实也在选择将自己的内容放置于哪个时间坐标之上。</p><p>我们建议所有对出版物感兴趣的设计师做一个练习：把同一段文字用五种不同字体排出来，然后问自己：哪个版本在什么年代发生？答案会让你对字体的理解产生质变。</p><p>好的字体选择是隐形的。读者不会注意到它，但如果换掉，他们会感到某种说不清楚的不对劲。这种「不被察觉」，是最高的标准。</p>`

/* ============================================================
   FOCUS STACK
   每次打开一个窗口就压栈，关闭时弹栈。
   Space/Enter/Esc 只作用于栈顶窗口（不含 Toast）。
   菜单优先级最高，独立于栈之外单独处理。
============================================================ */
const focusStack = [];

function focusPush(id) {
  // 防止重复压栈
  if (focusStack[focusStack.length - 1] === id) return;
  focusStack.push(id);
}
function focusPop(id) {
  const idx = focusStack.lastIndexOf(id);
  if (idx !== -1) focusStack.splice(idx, 1);
}
function focusTop() {
  return focusStack[focusStack.length - 1] || null;
}

function openModal(el)  { el.classList.add('visible');    focusPush(el.id); }
function closeModal(el) { el.classList.remove('visible'); focusPop(el.id); }

linkModal.addEventListener('click',  e => { if (e.target === linkModal  && focusTop() === 'linkModal')  closeModal(linkModal); });
emailModal.addEventListener('click', e => { if (e.target === emailModal && focusTop() === 'emailModal') closeModal(emailModal); });

});

/* ── localStorage: 保存/恢复媒体进度 ── */
function lbStorageKey(url, name) {
  return 'lb-media:' + (url || name || '');
}
function lbSaveProgress(url, name, currentTime, paused) {
  try {
    const key = lbStorageKey(url, name);
    if (key !== 'lb-media:') localStorage.setItem(key, JSON.stringify({ currentTime, paused }));
  } catch(_) {}
}
function lbLoadProgress(url, name) {
  try {
    const raw = localStorage.getItem(lbStorageKey(url, name));
    return raw ? JSON.parse(raw) : null;
  } catch(_) { return null; }
}

const LB_IMG  = ['jpg','jpeg','png','gif','webp','bmp','svg','avif','heic','ico'];
const LB_VID  = ['mp4','webm','mov','mkv','m4v'];
const LB_AUD  = ['mp3','flac','wav','aac','opus','m4a','ogg'];
const LB_TXT  = ['txt','json','yaml','yml','toml','ini','conf','xml','csv','log','rst'];
const LB_PDF  = ['pdf'];
const LB_HTML = ['html','htm'];
const LB_MD   = ['md','markdown'];

function lbTypeFromName(name) {
  const ext = (name || '').split('.').pop().toLowerCase();
  if (LB_IMG.includes(ext))  return 'image';
  if (LB_VID.includes(ext))  return 'video';
  if (LB_AUD.includes(ext))  return 'audio';
  if (LB_TXT.includes(ext))  return 'text';
  if (LB_HTML.includes(ext)) return 'html';
  if (LB_MD.includes(ext))   return 'markdown';
  return 'placeholder';
}

  iconWrap.className = 'lb-ctrl-icon';
  bar.appendChild(iconWrap);

  const svgPlay  = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><polygon points="4,2 14,8 4,14" fill="currentColor"/></svg>`;
  const svgPause = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="3" y="2" width="3.5" height="12" rx="1" fill="currentColor"/><rect x="9.5" y="2" width="3.5" height="12" rx="1" fill="currentColor"/></svg>`;

  function updateIcon() { iconWrap.innerHTML = mediaEl.paused ? svgPlay : svgPause; }
  function updateProg() {
    if (!mediaEl.duration) return;
    prog.style.width = (mediaEl.currentTime / mediaEl.duration * 100) + '%';
  }
  mediaEl.addEventListener('play',            updateIcon);
  mediaEl.addEventListener('pause',           updateIcon);
  mediaEl.addEventListener('timeupdate',      updateProg);
  mediaEl.addEventListener('loadedmetadata',  updateProg);
  updateIcon();

  let dragStartX = null, dragStartTime = null, isDragging = false;

  function onStart(cx) {
    if (!mediaEl.duration) return;
    dragStartX = cx; dragStartTime = mediaEl.currentTime; isDragging = false;
  }
  function onMove(cx) {
    if (dragStartX === null) return;
    const dx = cx - dragStartX;
    if (Math.abs(dx) > 4) isDragging = true;
    if (!isDragging) return;
    const rect = bar.getBoundingClientRect();
    const t = Math.max(0, Math.min(mediaEl.duration, dragStartTime + (dx / rect.width) * mediaEl.duration));
    mediaEl.currentTime = t;
    prog.style.width = (t / mediaEl.duration * 100) + '%';
  }
  function onEnd() {
    if (!isDragging && dragStartX !== null) {
      mediaEl.paused ? mediaEl.play().catch(()=>{}) : mediaEl.pause();
    }
    dragStartX = null; dragStartTime = null; isDragging = false;
  }

  bar.addEventListener('mousedown',  e => { e.preventDefault(); onStart(e.clientX); });
  window.addEventListener('mousemove', e => onMove(e.clientX));
  window.addEventListener('mouseup',   onEnd);
  bar.addEventListener('touchstart', e => onStart(e.touches[0].clientX), { passive: true });
  bar.addEventListener('touchmove',  e => { e.preventDefault(); onMove(e.touches[0].clientX); }, { passive: false });
  bar.addEventListener('touchend',   onEnd);

  return bar;
}

/* ── 音频动画 ── */
let lbAudioAnimFrame = null;
const BAR_HEIGHTS = [0.4,0.7,1,0.6,0.85,0.5,0.75,0.45,0.9,0.55,0.65,0.8];
function startAudioAnim(barsEl, mediaEl) {
  let t = 0;
  function step() {
    if (!mediaEl || mediaEl.paused) { lbAudioAnimFrame = null; return; }
    t += 0.07;
    [...barsEl.children].forEach((b, i) => {
      b.style.height = Math.max(4, 8 + Math.sin(t + i * 0.6) * BAR_HEIGHTS[i % BAR_HEIGHTS.length] * 20) + 'px';
    });
    lbAudioAnimFrame = requestAnimationFrame(step);
  }
  lbAudioAnimFrame = requestAnimationFrame(step);
}
function stopAudioAnim() {
  if (lbAudioAnimFrame) { cancelAnimationFrame(lbAudioAnimFrame); lbAudioAnimFrame = null; }
}

/* ── 复制按钮 ── */
function buildCopyBtn(text) {
  const btn = document.createElement('div');
  btn.className = 'lb-copy-btn';
  const svgCopy  = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="8" height="9" rx="1.2" stroke="currentColor" stroke-width="1.1"/><path d="M3 11V3h8" stroke="currentColor" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const svgCheck = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><polyline points="3,8 6.5,11.5 13,5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  btn.innerHTML = svgCopy;
  btn.addEventListener('click', () => {
    if (btn.classList.contains('copied')) return;
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(text).catch(() => execCopy(text));
    } else { execCopy(text); }
    btn.classList.add('copied');
    btn.innerHTML = svgCheck;
    setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = svgCopy; }, 3000);
  });
  return btn;
}

/* ── 渲染灯箱内容 ── */
function lbRender(file) {
  if (lbMediaEl) { lbMediaEl.pause?.(); lbMediaEl = null; }
  if (lbImgEl)   { lbImgEl.src = ''; lbImgEl = null; }
  stopAudioAnim();
  /* 中止上一个正在进行的 fetch */
  if (lbFetchController) { lbFetchController.abort(); lbFetchController = null; }
  /* 移除上次注入的 ctrl / copy bar */
  [...lightboxFrame.children].forEach(c => { if (c !== lightboxInner) c.remove(); });
  lightboxInner.innerHTML = '';
  lightboxInner.style.cssText = '';

  lbCurFile = file;
  const resolvedUrl = lbResolveUrl(file?.url || '');
  const urlType     = getUrlType(file?.url || '');
  const name        = file?.name || '';
  const rawType     = lbTypeFromName(name);
  /* 网盘链接无法在线预览，降级 */
  lbCurType = (urlType === 'external') ? 'placeholder' : rawType;

  const placeholder = label => {
    lightboxInner.style.cssText = 'min-height:120px;display:flex;align-items:center;justify-content:center;';
    lightboxInner.innerHTML = `<span class="lb-placeholder">${label}</span>`;
  };

  switch (lbCurType) {

    case 'image': {
      if (!resolvedUrl) { placeholder(LB_PLACEHOLDER_LABELS.image); break; }
      const img = document.createElement('img');
      img.className = 'lb-img'; img.loading = 'lazy'; img.alt = name;
      img.onerror = () => { lightboxInner.innerHTML = `<span class="lb-placeholder">${LB_PLACEHOLDER_LABELS.image}</span>`; };
      img.src = resolvedUrl;
      lbImgEl = img;
      lightboxInner.appendChild(img);
      lbBindLongPress(lightboxInner);
      break;
    }

    case 'video': {
      lightboxInner.style.minHeight = '200px';
      if (!resolvedUrl) { placeholder(LB_PLACEHOLDER_LABELS.video); break; }
      const vid = document.createElement('video');
      vid.className = 'lb-video'; vid.controls = false; vid.playsInline = true; vid.preload = 'metadata';
      vid.onerror = () => { lightboxInner.innerHTML = `<span class="lb-placeholder">${LB_PLACEHOLDER_LABELS.video}</span>`; lightboxFrame.querySelector('.lb-ctrl')?.remove(); };
      vid.src = resolvedUrl; lbMediaEl = vid;
      lightboxInner.appendChild(vid);
      vid.addEventListener('loadedmetadata', () => {
        const saved = lbLoadProgress(resolvedUrl, name);
        if (saved) { vid.currentTime = saved.currentTime; if (!saved.paused) vid.play().catch(()=>{}); }
      }, { once: true });
      lightboxFrame.appendChild(buildCtrlBar(vid));
      lbBindLongPress(lightboxInner);
      break;
    }

    case 'audio': {
      lightboxInner.style.cssText = 'min-height:100px;';
      if (!resolvedUrl) { placeholder(LB_PLACEHOLDER_LABELS.audio); break; }
      const aud = document.createElement('audio');
      aud.preload = 'metadata'; aud.src = resolvedUrl; lbMediaEl = aud;
      aud.onerror = () => { lightboxInner.innerHTML = `<span class="lb-placeholder">${LB_PLACEHOLDER_LABELS.audio}</span>`; };

      const titleEl = document.createElement('div');
      titleEl.className = 'lb-audio-title';
      titleEl.textContent = name;
      lightboxInner.appendChild(titleEl);

      aud.addEventListener('loadedmetadata', () => {
        const saved = lbLoadProgress(resolvedUrl, name);
        if (saved) { aud.currentTime = saved.currentTime; if (!saved.paused) aud.play().catch(()=>{}); }
      }, { once: true });

      lightboxFrame.appendChild(buildCtrlBar(aud));
      lbBindLongPress(lightboxInner);
      break;
    }

    case 'text': {
      lightboxInner.style.cssText = 'align-items:flex-start;justify-content:flex-start;min-height:180px;';
      if (!resolvedUrl) { placeholder(LB_PLACEHOLDER_LABELS.text); break; }
      const pre = document.createElement('div'); pre.className = 'lb-text';
      lightboxInner.appendChild(pre);
      lbFetchController = new AbortController();
      fetch(resolvedUrl, { signal: lbFetchController.signal })
        .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
        .then(text => {
          lbFetchController = null;
          pre.textContent = text;
          lightboxFrame.appendChild(buildCopyBtn(text));
          lbBindLongPress(lightboxInner);
        })
        .catch(err => {
          lbFetchController = null;
          if (err.name === 'AbortError') return; // 灯箱已关闭，静默处理
          lightboxInner.innerHTML = `<span class="lb-placeholder">${LB_PLACEHOLDER_LABELS.text}</span>`;
        });
      break;
    }

    case 'pdf': {
      placeholder(LB_PLACEHOLDER_LABELS.pdf);
      lbBindLongPress(lightboxInner);
      break;
    }

    case 'html':
    case 'markdown': {
      lightboxInner.style.minHeight = '280px';
      if (!resolvedUrl) { placeholder(LB_PLACEHOLDER_LABELS[lbCurType]); break; }

      /* ── 构建预览/源码切换滑块 ── */
      function buildViewSwitcher(rawSource, previewEl, sourceEl) {
        const switcher = document.createElement('div');
        switcher.className = 'lb-view-switcher';

        const slider = document.createElement('div');
        slider.className = 'lb-view-slider';

        const svgEye  = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><ellipse cx="8" cy="8" rx="6" ry="3.5" stroke="currentColor" stroke-width="1.1"/><circle cx="8" cy="8" r="1.8" fill="currentColor"/></svg>`;
        const svgCode = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><polyline points="5,4 1,8 5,12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="11,4 15,8 11,12" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
        const svgCheck = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><polyline points="3,8 6.5,11.5 13,5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

        const btnPreview = document.createElement('button');
        btnPreview.className = 'lb-view-btn active';
        btnPreview.innerHTML = svgEye;

        const btnSource = document.createElement('button');
        btnSource.className = 'lb-view-btn';
        btnSource.innerHTML = svgCode;

        /* 居中对勾层（复制成功时显示） */
        const checkEl = document.createElement('div');
        checkEl.className = 'lb-view-switcher-check';
        checkEl.innerHTML = svgCheck;

        switcher.appendChild(slider);
        switcher.appendChild(btnPreview);
        switcher.appendChild(btnSource);
        switcher.appendChild(checkEl);

        let curView = 'preview';
        function setView(v) {
          curView = v;
          if (v === 'preview') {
            slider.classList.remove('source');
            btnPreview.classList.add('active');
            btnSource.classList.remove('active');
            previewEl.classList.remove('hidden'); previewEl.classList.add('active');
            sourceEl.classList.remove('active');  sourceEl.classList.add('hidden');
          } else {
            slider.classList.add('source');
            btnSource.classList.add('active');
            btnPreview.classList.remove('active');
            sourceEl.classList.remove('hidden');  sourceEl.classList.add('active');
            previewEl.classList.remove('active'); previewEl.classList.add('hidden');
          }
        }
        btnPreview.addEventListener('click', () => { if (!switcher.classList.contains('copied')) setView('preview'); });
        btnSource.addEventListener('click',  () => { if (!switcher.classList.contains('copied')) setView('source'); });

        /* 长按复制源码 */
        let copyTimer = null;
        const cancelCopy = () => { clearTimeout(copyTimer); copyTimer = null; };
        const startCopy  = () => {
          copyTimer = setTimeout(() => {
            if (navigator.clipboard?.writeText) {
              navigator.clipboard.writeText(rawSource).catch(() => execCopy(rawSource));
            } else { execCopy(rawSource); }
            /* 整个条变绿，居中显示单个对勾 */
            switcher.classList.add('copied');
            setTimeout(() => {
              switcher.classList.remove('copied');
            }, 3000);
          }, 600);
        };
        switcher.addEventListener('mousedown',   startCopy);
        switcher.addEventListener('mouseup',     cancelCopy);
        switcher.addEventListener('mouseleave',  cancelCopy);
        switcher.addEventListener('touchstart',  startCopy, { passive: true });
        switcher.addEventListener('touchend',    cancelCopy);
        switcher.addEventListener('touchcancel', cancelCopy);

        setView('preview');
        return switcher;
      }

      /* ── 内容区：预览层 + 源码层并排在 lightboxInner 内 ── */
      lightboxInner.style.cssText = 'flex-direction:column;align-items:stretch;justify-content:flex-start;overflow:hidden;';

      const previewEl = document.createElement(lbCurType === 'html' ? 'iframe' : 'div');
      previewEl.className = 'lb-render-preview active';
      if (lbCurType === 'html') {
        previewEl.sandbox = 'allow-scripts allow-same-origin';
      } else {
        previewEl.style.cssText = 'overflow-y:auto;scrollbar-width:none;padding:14px 16px;flex:1;min-height:0;';
      }

      const sourceEl = document.createElement('div');
      sourceEl.className = 'lb-render-source hidden';

      lightboxInner.appendChild(previewEl);
      lightboxInner.appendChild(sourceEl);

      /* fetch 源码 */
      lbFetchController = new AbortController();
      fetch(resolvedUrl, { signal: lbFetchController.signal })
        .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
        .then(raw => {
          lbFetchController = null;

          /* 源码层：highlight.js 高亮 */
          const lang = lbCurType === 'html' ? 'html' : 'markdown';
          const highlighted = (typeof hljs !== 'undefined')
            ? hljs.highlight(raw, { language: lang, ignoreIllegals: true }).value
            : raw.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
          sourceEl.innerHTML = `<code class="hljs language-${lang}">${highlighted}</code>`;

          /* 预览层 */
          if (lbCurType === 'html') {
            previewEl.srcdoc = raw;
          } else {
            /*
             * ── MARKDOWN RENDERER INTERFACE ──────────────────────────────
             * window.renderMarkdown(text) → HTML string
             * 由合成脚本实现并挂载到 window。
             * 未实现时 fallback：显示纯文本（保留换行）。
             * ─────────────────────────────────────────────────────────────
             */
            if (typeof window.renderMarkdown === 'function') {
              previewEl.innerHTML = window.renderMarkdown(raw);
            } else {
              previewEl.style.cssText += 'white-space:pre-wrap;font-size:0.72rem;color:var(--text-secondary);line-height:1.9;letter-spacing:0.04em;';
              previewEl.textContent = raw;
            }
          }

          lightboxFrame.appendChild(buildViewSwitcher(raw, previewEl, sourceEl));
          lbBindLongPress(lightboxInner);
        })
        .catch(err => {
          lbFetchController = null;
          if (err.name === 'AbortError') return;
          lightboxInner.style.cssText = 'display:flex;align-items:center;justify-content:center;';
          lightboxInner.innerHTML = `<span class="lb-placeholder">${LB_PLACEHOLDER_LABELS[lbCurType]}</span>`;
        });
      break;
    }

    default:
      placeholder(LB_PLACEHOLDER_LABELS.placeholder);
      lbBindLongPress(lightboxInner);
  }
}

/* ── openLightbox 统一入口 ── */
function openLightbox(arg) {
  let file = null;
  if (arg && typeof arg === 'object' && 'name' in arg) {
    file = arg;
  } else if (typeof arg === 'number') {
    const d = galleryData[arg];
    file = { name: (d?.caption || String(arg)) + '.jpg', url: d?.image || '' };
  } else if (arg && typeof arg === 'object') {
    file = { name: (arg.alt || 'image') + '.jpg', url: arg.src || '' };
  } else {
    file = { name: String(arg || ''), url: '' };
  }
  lbRender(file);
  lightbox.classList.add('visible');
  focusPush('lightbox');
}

function closeLightbox() {
  if (lbFetchController) { lbFetchController.abort(); lbFetchController = null; }
  if (lbImgEl)   { lbImgEl.src = ''; lbImgEl = null; }
  if (lbMediaEl) {
    const resolvedUrl = lbResolveUrl(lbCurFile?.url || '');
    lbSaveProgress(resolvedUrl, lbCurFile?.name || '', lbMediaEl.currentTime, lbMediaEl.paused);
    lbMediaEl.pause();
  }
  stopAudioAnim();
  lightbox.classList.remove('visible');
  focusPop('lightbox');
}
lightbox.addEventListener('pointerdown', e => { if (e.target === lightbox && focusTop() === 'lightbox') closeLightbox(); });
lightboxFrame.addEventListener('pointerdown', e => e.stopPropagation());

   PAGE 3 — STACK VIEWER
============================================================ */
const stackBox      = document.getElementById('stackBox');
const stackCards    = document.getElementById('stackCards');
const stackOverlay  = document.getElementById('stackOverlay');
const stackProgress = document.getElementById('stackProgress');

/* galleryData — Page 3 唯一数据来源：轮播取前7条，长按画廊显示全部 */
const galleryData = [
  { image: '', caption: '01' },  // e.g. { image: 'images/gallery/01.jpg', caption: 'Forma — Event' }
  { image: '', caption: '02' },
  { image: '', caption: '03' },
  { image: '', caption: '04' },
  { image: '', caption: '05' },
  { image: '', caption: '06' },
  { image: '', caption: '07' },
  { image: '', caption: '08' },
];
const STACK_COUNT  = Math.min(7, galleryData.length);
const stackLightColors = ['#ddd8d0','#e0dbd2','#d8d3ca','#e4dfd7','#dbd5cc','#e2ddd5'];
const stackDarkColors  = ['#3a3535','#383330','#352f2a','#3c3830','#332e2a','#3a3630'];
function getStackColor(i) {
  return document.documentElement.classList.contains('dark') ? stackDarkColors[i] : stackLightColors[i];
}

let stackOrder = [], stackTimer = null, stackUserStopped = false;
let isListMode = false, listCur = 0;
let listAutoTimer = null, listUserStopped = false;

function createStackCards() {
  stackCards.innerHTML = ''; stackOrder = [];
  galleryData.slice(0, STACK_COUNT).forEach((d, i) => {
    const card = document.createElement('div');
    card.className = 'stack-card';
    card.dataset.idx = i;
    if (d.image) {
      // 有图：背景透明，img 铺满
      const img = document.createElement('img');
      img.src = d.image;
      img.alt = d.caption;
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;border-radius:inherit;';
      card.appendChild(img);
    } else {
      // 无图：色块 + caption 占位
      card.style.background = getStackColor(i);
      const lbl = document.createElement('span');
      lbl.textContent = d.caption;
      card.appendChild(lbl);
    }
    card.addEventListener('click', () => {
      if (!isListMode) {
        const isTop = stackOrder.indexOf(card) === stackOrder.length - 1;
        if (isTop) { openLightbox(i); }
        else { stopStackByUser(); bringToTop(card); }
      } else {
        openLightbox(i);
      }
    });
    stackCards.appendChild(card);
    stackOrder.push(card);
  });
}

function applyStackZIndices() {
  stackOrder.forEach((card, i) => { card.style.zIndex = i; });
}

function initStackPositions() {
  const cards = [...stackCards.querySelectorAll('.stack-card')];
  const bw = stackBox.offsetWidth, bh = stackBox.offsetHeight;
  const cx = bw / 2, cy = 28 + (bh - 28) / 2;
  const w = bw * 0.58, h = w * (4 / 3);
  cards.forEach(card => {
    const rx = rand(-bw * 0.10, bw * 0.10);
    const ry = rand(-bh * 0.08, bh * 0.08);
    const rot = rand(-12, 12);
    card.dataset.stackLeft   = cx - w / 2 + rx;
    card.dataset.stackTop    = cy - h / 2 + ry;
    card.dataset.stackRotate = rot;
    card.style.width  = w + 'px';
    card.style.height = h + 'px';
    card.style.left   = card.dataset.stackLeft + 'px';
    card.style.top    = card.dataset.stackTop  + 'px';
    card.style.rotate = rot + 'deg';
    card.style.borderRadius = '8px';
    card.style.transition = 'z-index 0s, box-shadow 0.2s';
  });
  applyStackZIndices();
}

function bringToTop(card) {
  const idx = stackOrder.indexOf(card);
  if (idx === -1 || idx === stackOrder.length - 1) return;
  stackOrder.splice(idx, 1); stackOrder.push(card);
  applyStackZIndices();
}

function startStackAuto() {
  if (stackUserStopped) return;
  clearInterval(stackTimer);
  stackTimer = setInterval(() => {
    if (isListMode) return;
    const top = stackOrder.pop(); stackOrder.unshift(top);
    applyStackZIndices();
  }, 2200);
}
function stopStackAuto()  { clearInterval(stackTimer); stackTimer = null; }
function stopStackByUser(){ stackUserStopped = true; stopStackAuto(); }

function initProgress() {
  stackProgress.innerHTML = '';
  for (let i = 0; i < STACK_COUNT; i++) {
    const bar = document.createElement('div');
    bar.className = 'dot-bar';
    bar.addEventListener('click', () => {
      if (!isListMode) return;
      listUserStopped = true; clearInterval(listAutoTimer);
      listCur = i; updateProgress(i); applyListPositions();
    });
    stackProgress.appendChild(bar);
  }
}
function updateProgress(idx) {
  stackProgress.querySelectorAll('.dot-bar').forEach((b, i) => b.classList.toggle('active', i === idx));
}

function applyListPositions() {
  const cards = [...stackCards.querySelectorAll('.stack-card')];
  const bw = stackBox.offsetWidth, bh = stackBox.offsetHeight;
  cards.forEach((card, i) => {
    card.style.transition = 'left 0.5s cubic-bezier(0.77,0,0.175,1), top 0s, rotate 0s, width 0s, height 0s';
    card.style.width  = bw + 'px'; card.style.height = bh + 'px';
    card.style.top    = '0px';     card.style.rotate = '0deg';
    card.style.zIndex = STACK_COUNT - i;
    card.style.left   = (i - listCur) * bw + 'px';
    card.style.borderRadius = '0';
  });
}
function restoreStackPositions() {
  const cards = [...stackCards.querySelectorAll('.stack-card')];
  const bw = stackBox.offsetWidth;
  const w = bw * 0.65, h = w * (4 / 3);
  cards.forEach(card => {
    card.style.transition = 'left 0.5s ease, top 0.5s ease, rotate 0.5s ease, width 0.5s ease, height 0.5s ease';
    card.style.width  = w + 'px'; card.style.height = h + 'px';
    card.style.left   = card.dataset.stackLeft   + 'px';
    card.style.top    = card.dataset.stackTop    + 'px';
    card.style.rotate = card.dataset.stackRotate + 'deg';
    card.style.borderRadius = '8px';
  });
  applyStackZIndices();
}

function startListAuto() {
  if (listUserStopped) return;
  clearInterval(listAutoTimer);
  listAutoTimer = setInterval(() => {
    if (!isListMode) return;
    listCur = (listCur + 1) % STACK_COUNT;
    updateProgress(listCur); applyListPositions();
  }, 2500);
}
function enterListMode() {
  isListMode = true; listCur = 0;
  stackProgress.classList.add('visible');
  updateProgress(0); applyListPositions(); startListAuto();
}
function enterStackMode() {
  isListMode = false; clearInterval(listAutoTimer);
  stackProgress.classList.remove('visible');
  restoreStackPositions(); startStackAuto();
}

/* Swipe on page 3 */
let p3DragX = null, p3DragY = null;
function handleP3Swipe(dx, dy) {
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
    if (!isListMode && dx < 0)  { enterListMode(); return; }
    if (isListMode && dx > 0) {
      if (listCur === 0) { enterStackMode(); return; }
      listCur = Math.max(0, listCur - 1);
      updateProgress(listCur); applyListPositions();
      listUserStopped = true; clearInterval(listAutoTimer);
      return;
    }
    if (isListMode && dx < 0) {
      listCur = Math.min(STACK_COUNT - 1, listCur + 1);
      updateProgress(listCur); applyListPositions();
      listUserStopped = true; clearInterval(listAutoTimer);
    }
  } else if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 50) {
    if (dy > 0 && !pageSwipeCooldown) {
      goToPage(1); pageSwipeCooldown = true; setTimeout(() => pageSwipeCooldown = false, 900);
    } else if (dy < 0 && !pageSwipeCooldown) {
      goToPage(3); pageSwipeCooldown = true; setTimeout(() => pageSwipeCooldown = false, 900);
    }
  }
}
const swipeEl3 = document.getElementById('stackOuter');
swipeEl3.addEventListener('mousedown',  e => { p3DragX = e.clientX; p3DragY = e.clientY; });
swipeEl3.addEventListener('mouseup',    e => {
  if (p3DragX === null) return;
  handleP3Swipe(e.clientX - p3DragX, e.clientY - p3DragY);
  p3DragX = null; p3DragY = null;
});
swipeEl3.addEventListener('mouseleave', () => { p3DragX = null; p3DragY = null; });
swipeEl3.addEventListener('touchstart', e => {
  p3DragX = e.touches[0].clientX; p3DragY = e.touches[0].clientY;
}, { passive: true });
swipeEl3.addEventListener('touchend', e => {
  if (p3DragX === null) return;
  handleP3Swipe(e.changedTouches[0].clientX - p3DragX, e.changedTouches[0].clientY - p3DragY);
  p3DragX = null; p3DragY = null;
}, { passive: true });

function getNearestDocTab() {

    if (dist < minDist) { minDist = dist; nearest = i; }
  });
  return nearest;
}

const EXTERNAL_DOMAINS = [
  'onedrive.live.com',
  '1drv.ms',
  '123pan.com',
  'lanzou',   // covers lanzoux / lanzoui / lanzouw etc.
];

function getUrlType(url) {
  if (!url) return 'none';
  try {
    const host = new URL(url).hostname;
    if (EXTERNAL_DOMAINS.some(d => host.includes(d))) return 'external';
  } catch(_) {}
  return 'direct';
}

const TOAST_MAX = 3, TOAST_LIFE = 3000, TOAST_EXIT = 350, REDEEM_LOCK = 1000;
const toastList = [];
let redeemLocked = false, redeemLockTimer = null, redeemCurrentCode = '';

function showToast(msg, error = false) {
  const insert = () => {
    const el = document.createElement('div');
    el.className = 'redeem-toast' + (error ? ' redeem-toast--error' : '');
    el.textContent = msg;
    redeemToastStack.insertBefore(el, redeemToastStack.firstChild);
    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('enter')));
    const timerId = setTimeout(() => dismissToast(entry), TOAST_LIFE);
    const entry = { el, timerId };
    toastList.push(entry);
  };
  if (toastList.length >= TOAST_MAX) {
    const oldest = toastList.shift();
    clearTimeout(oldest.timerId);
    oldest.el.classList.replace('enter', 'exit');
    setTimeout(() => { oldest.el.remove(); insert(); }, TOAST_EXIT);
  } else { insert(); }
}

/* ── Global toast (viewport top-right, independent stack) ── */
const globalToastList = [];
const DOWNLOAD_VARIANTS = new Set(['warning', 'success', 'error']);
let downloadToastEntry = null;

function dismissEntry(entry, list) {
  clearTimeout(entry.timerId);
  entry.el.classList.replace('enter', 'exit');
  setTimeout(() => entry.el.remove(), TOAST_EXIT);
  if (list) { const i = list.indexOf(entry); if (i !== -1) list.splice(i, 1); }
}

function showGlobalToast(msg, variant = '') {
  const globalToastStack = document.getElementById('globalToastStack');

  /* 下载类 toast 互斥：强制清除所有下载类残留（含退场中的），再插入新的 */
  if (DOWNLOAD_VARIANTS.has(variant)) {
    /* 清 list 里的下载条目 */
    for (let i = globalToastList.length - 1; i >= 0; i--) {
      if (DOWNLOAD_VARIANTS.has(globalToastList[i].variant)) {
        const old = globalToastList.splice(i, 1)[0];
        clearTimeout(old.timerId);
        old.el.remove();
      }
    }
    /* 兜底：清 DOM 里所有带下载 variant class 的残留 el */
    DOWNLOAD_VARIANTS.forEach(v => {
      globalToastStack.querySelectorAll('.redeem-toast--' + v).forEach(el => el.remove());
    });
    downloadToastEntry = null;
  }

  /* 全局上限 3 个：超出时移除最旧的 */
  while (globalToastList.length >= TOAST_MAX) {
    const oldest = globalToastList.shift();
    clearTimeout(oldest.timerId);
    oldest.el.remove();
  }

  const el = document.createElement('div');
  el.className = 'redeem-toast' + (variant ? ' redeem-toast--' + variant : '');
  el.textContent = msg;
  globalToastStack.insertBefore(el, globalToastStack.firstChild);
  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('enter')));
  const entry = { el, variant, timerId: null };
  entry.timerId = setTimeout(() => {
    el.classList.replace('enter', 'exit');
    setTimeout(() => {
      el.remove();
      const i = globalToastList.indexOf(entry);
      if (i !== -1) globalToastList.splice(i, 1);
      if (downloadToastEntry === entry) downloadToastEntry = null;
    }, TOAST_EXIT);
  }, TOAST_LIFE);
  globalToastList.push(entry);
  if (DOWNLOAD_VARIANTS.has(variant)) downloadToastEntry = entry;
}
function dismissToast(entry) {
  const idx = toastList.indexOf(entry);
  if (idx === -1) return;
  toastList.splice(idx, 1);
  clearTimeout(entry.timerId);
  entry.el.classList.replace('enter', 'exit');
  setTimeout(() => entry.el.remove(), TOAST_EXIT);
}

function startFinalAnim() {
  const token = ++finalToken;
  finalDone = false;
  [finalBrandEl, finalSuffixEl, finalByEl, finalNameEl].forEach(el => el.innerHTML = '');
  const cursor = '<span class="cursor-blink">|</span>';

  function typeStr(el, str, speed, showCursor, cb) {
    let i = 0;
    (function step() {
      if (finalToken !== token) return;
      if (i < str.length) {
        el.innerHTML = str.slice(0, ++i) + (showCursor ? cursor : '');
        setTimeout(step, speed + Math.random() * 40);
      } else if (cb) setTimeout(cb, 300);
    })();
  }
  function deleteStr(el, str, keepCursor, cb) {
    let remaining = str;
    (function step() {
      if (finalToken !== token) return;
      if (remaining.length > 0) {
        remaining = remaining.slice(0, -1);
        el.innerHTML = remaining + (keepCursor ? cursor : '');
        setTimeout(step, 80 + Math.random() * 40);
      } else {
        el.innerHTML = keepCursor ? cursor : '';
        if (cb) setTimeout(cb, 200);
      }
    })();
  }

  const suffixes = ['Ltd.','ORG.','Grp.','Studio'];
  function cycleNext(i, cb) {
    if (i >= suffixes.length) { cb(); return; }
    typeStr(finalSuffixEl, suffixes[i], 130, true, () => {
      if (i === suffixes.length - 1) { finalSuffixEl.innerHTML = suffixes[i]; cb(); return; }
      setTimeout(() => deleteStr(finalSuffixEl, suffixes[i], true, () => cycleNext(i + 1, cb)), i === 0 ? 600 : 500);
    });
  }

  typeStr(finalBrandEl, 'Aermium', 140, true, () => {
    finalBrandEl.innerHTML = 'Aermium';
    cycleNext(0, () => {
      setTimeout(() => typeStr(finalByEl, 'BY', 120, false, () => {
        setTimeout(() => typeStr(finalNameEl, 'Ae1autumn', 110, false, () => {
          if (finalToken !== token) return;
          finalDone = true;
        }), 200);
      }), 400);
    });
  });
}

function makeSVGBlob(idx) {
  const seed = Math.floor(Math.random() * 99);

function overlaps(a, b) {
  const p = 20;
