    if (ripple) { ripple.remove(); ripple = null; }
  }
  function onStart(x, y) {
    didLongPress = false;
    pressX = x; pressY = y;
    startRipple(x, y);
    pressTimer = setTimeout(() => {
      didLongPress = true;
      removeRipple();
      openGallery();
    }, 500);
  }
  function onEnd() {
    clearTimeout(pressTimer); pressTimer = null;
    removeRipple();
  }
  target.addEventListener('mousedown', e => { onStart(e.offsetX, e.offsetY); });
  target.addEventListener('mouseup',   () => { onEnd(); });
  target.addEventListener('mouseleave',() => { onEnd(); });
  target.addEventListener('touchstart', e => {
    const r = target.getBoundingClientRect();
    onStart(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top);
  }, { passive: true });
  target.addEventListener('touchend',   () => { onEnd(); }, { passive: true });
  target.addEventListener('touchcancel',() => { onEnd(); }, { passive: true });
  /* Prevent the normal click/drag logic from firing after long-press */
  target.addEventListener('click', e => { if (didLongPress) { e.stopPropagation(); didLongPress = false; } }, true);
})();

/* ============================================================
   BLOG LIST OVERLAY (long-press on page 4 — blog carousel)
============================================================ */
const blogListOverlay = document.getElementById('blogListOverlay');
const blogListGrid    = document.getElementById('blogListGrid');

function buildBlogList() {
  blogListGrid.innerHTML = '';
  blogData.forEach((d, i) => {
    const card = document.createElement('div');
    card.className = 'blog-list-card';
    card.innerHTML = `
      <div class="blog-list-card-meta">
        <span class="blog-list-card-date">${d.date}</span>
        <div class="blog-list-card-sep"></div>
        <span class="blog-list-card-cat">${d.category}</span>
      </div>
      <div class="blog-list-card-title">${d.title}</div>
      <div class="blog-list-card-excerpt">${d.excerpt.replace(/<br>/g, ' ')}</div>
      <div class="blog-list-card-footer">
        <span class="blog-list-card-time">${d.readTime}</span>
        <span class="blog-list-card-arrow">→</span>
      </div>`;
    card.addEventListener('click', () => {
      closeBlogList();
      openBlog(i);
    });
    blogListGrid.appendChild(card);
  });
}
buildBlogList();

function openBlogList() {
  blogListOverlay.classList.add('visible');
  focusPush('blogListOverlay');
}
function closeBlogList() {
  blogListOverlay.classList.remove('visible');
  focusPop('blogListOverlay');
}
blogListOverlay.addEventListener('click', e => { if (e.target === blogListOverlay && focusTop() === 'blogListOverlay') closeBlogList(); });

/* Long-press on blogCarousel */
(function() {
  const target = document.getElementById('blogCarousel');
  let pressTimer = null;
  let ripple = null;
  let didLongPress = false;

  function startRipple(x, y) {
    ripple = document.createElement('div');
    ripple.className = 'longpress-hint';
    ripple.style.left = x + 'px';
    ripple.style.top  = y + 'px';
    target.style.position = 'relative';
    target.appendChild(ripple);
    requestAnimationFrame(() => ripple.classList.add('pressing'));
  }
  function removeRipple() {
    if (ripple) { ripple.remove(); ripple = null; }
  }
  function onStart(x, y) {
    didLongPress = false;
    startRipple(x, y);
    pressTimer = setTimeout(() => {
      didLongPress = true;
      removeRipple();
      openBlogList();
    }, 500);
  }
  function onEnd() {
    clearTimeout(pressTimer); pressTimer = null;
    removeRipple();
  }
  target.addEventListener('mousedown', e => { onStart(e.offsetX, e.offsetY); });
  target.addEventListener('mouseup',   () => { onEnd(); });
  target.addEventListener('mouseleave',() => { onEnd(); });
  target.addEventListener('touchstart', e => {
    const r = target.getBoundingClientRect();
    onStart(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top);
  }, { passive: true });
  target.addEventListener('touchend',   () => { onEnd(); }, { passive: true });
  target.addEventListener('touchcancel',() => { onEnd(); }, { passive: true });
  target.addEventListener('click', e => { if (didLongPress) { e.stopPropagation(); didLongPress = false; } }, true);
})();

function anyOverlayOpen() {
  return focusStack.length > 0;
}

/* ── 关闭焦点栈顶部的窗口 ── */
function closeTopFocus() {
  const top = focusTop();
  if (!top) return false;
  switch (top) {
    case 'menuOverlay':    closeMenu();        break;
    case 'sheetOverlay':   closeSheet();       break;
    case 'blogListOverlay':closeBlogList();    break;
    case 'galleryOverlay': closeGallery();     break;
    case 'lightbox':       closeLightbox();    break;
    case 'linkModal':      closeModal(linkModal);  break;
    case 'emailModal':     closeModal(emailModal); break;
    case 'fileModal':        closeFileModal();        break;
    case 'lbDownloadModal':  closeLbDownloadModal();  break;
    default: return false;
  }
  return true;
}

function tryPageNav(dir) {
  if (pageSwipeCooldown || currentPage === 0) return;
  const target = currentPage + dir;
  if (target < 0 || target > 8) return;
  goToPage(target);
  pageSwipeCooldown = true;
  setTimeout(() => pageSwipeCooldown = false, 900);
}

/* ── Wheel navigation ── */
window.addEventListener('wheel', e => {
  if (currentPage === 0 || anyOverlayOpen()) return;
  if (currentPage === 2 && Math.abs(e.deltaY) <= Math.abs(e.deltaX || 0)) return;
  tryPageNav(e.deltaY > 0 ? 1 : -1);
}, { passive: true });

/* ── Touch swipe for vertical page navigation ── */
function addPageSwipe(pageId) {
  let touchY = null;
  const el = document.getElementById(pageId);
  el.addEventListener('touchstart', e => { touchY = e.touches[0].clientY; }, { passive: true });
  el.addEventListener('touchend',   e => {
    if (touchY === null) return;
    const dy = e.changedTouches[0].clientY - touchY; touchY = null;
    if (Math.abs(dy) > 50) tryPageNav(dy > 0 ? -1 : 1);
  }, { passive: true });
}
['page2','page4','page5','page6','page7','page8','page9'].forEach(addPageSwipe);

/* ── Page 1: swipe-down / wheel-down opens menu ── */
document.getElementById('page1').addEventListener('touchstart', e => {
  let startY = e.touches[0].clientY;
  document.getElementById('page1').addEventListener('touchend', e => {
    if (e.changedTouches[0].clientY - startY > 60 && currentPage === 0) openMenu();
  }, { once: true });
}, { passive: true });
document.getElementById('page1').addEventListener('wheel', e => {
  if (currentPage === 0 && e.deltaY > 30) openMenu();
}, { passive: true });

/* ============================================================
   MENU
============================================================ */
const MUSIC_SRC = 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3';
const menuOverlay = document.getElementById('menuOverlay');
const menuAudio   = new Audio(MUSIC_SRC);
menuAudio.loop    = true;

let menuOpen = false, themeCur = 1, isPlaying = false;
const themeSlider = document.getElementById('themeSlider');
const soundBtn    = document.getElementById('soundBtn');
const iconPlay    = document.getElementById('iconPlay');
const iconPause   = document.getElementById('iconPause');

function openMenu()  { menuOpen = true;  menuOverlay.classList.add('visible');    focusPush('menuOverlay'); }
function closeMenu() { menuOpen = false; menuOverlay.classList.remove('visible'); focusPop('menuOverlay'); }
menuOverlay.addEventListener('click', e => { if (e.target === menuOverlay && focusTop() === 'menuOverlay') closeMenu(); });

function applyTheme(i) {
  themeCur = i;
  themeSlider.style.transform = `translateX(${i * 54}px)`;
  setTimeout(() => {
    const html = document.documentElement;
    if (i === 0)      html.classList.remove('dark');
    else if (i === 2) html.classList.add('dark');
    else              html.classList.toggle('dark', window.matchMedia('(prefers-color-scheme: dark)').matches);
  }, 300);
  try { localStorage.setItem('aermium-theme', i); } catch(_) {}
}
try {
  const saved = localStorage.getItem('aermium-theme');
  if (saved !== null) themeCur = parseInt(saved);
} catch(_) {}
applyTheme(themeCur);
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
  if (themeCur === 1) document.documentElement.classList.toggle('dark', e.matches);
});

function setSound(on) {
  isPlaying = on;
  if (on) menuAudio.play().catch(() => {}); else menuAudio.pause();
  iconPlay.style.display  = on ? 'none'  : 'block';
  iconPause.style.display = on ? 'block' : 'none';
  soundBtn.classList.toggle('playing', on);
}

document.getElementById('themeLight').addEventListener('click', () => applyTheme(0));
document.getElementById('themeAuto').addEventListener('click',  () => applyTheme(1));
document.getElementById('themeDark').addEventListener('click',  () => applyTheme(2));
soundBtn.addEventListener('click', () => setSound(!isPlaying));

/* ============================================================
   KEYBOARD NAVIGATION
   Page 1 : Enter → advance
   Pages 2–8: ↑/W ↓/S → page nav; ←/A →/D → item nav
   E: toggle menu（最高优先级，不受焦点栈影响）
   Esc/Space/Enter: 只关闭焦点栈顶部的窗口
============================================================ */
document.addEventListener('keydown', e => {
  const key = e.key;
  if (key === 'Enter') e.preventDefault();

  /* E: toggle menu — 不管栈状态，始终可用 */
  if (key === 'e' || key === 'E') {
    e.preventDefault();
    if (menuOpen) closeMenu(); else openMenu();
    return;
  }

  /* 菜单在栈顶时，专属按键处理 */
  if (focusTop() === 'menuOverlay') {
    if (key === 'ArrowLeft')             { e.preventDefault(); applyTheme(Math.max(0, themeCur - 1)); return; }
    if (key === 'ArrowRight')            { e.preventDefault(); applyTheme(Math.min(2, themeCur + 1)); return; }
    if (key === 'Enter')                 { e.preventDefault(); setSound(!isPlaying); return; }
    if (key === 'Escape' || key === ' ') { e.preventDefault(); closeMenu(); return; }
    return; /* 菜单开着时屏蔽其他所有按键 */
  }

  /* linkModal 在栈顶时，Enter 确认、其他关闭键取消 */
  if (focusTop() === 'linkModal') {
    if (key === 'Escape' || key === ' ' || key === 'Enter') {
      e.preventDefault();
      if (key === 'Enter') document.getElementById('linkModalGo').click();
      else closeModal(linkModal);
    }
    return;
  }

  /* Esc / Space / Enter：只关闭栈顶窗口，关了就停止 */
  if (key === 'Escape' || key === ' ' || key === 'Enter') {
    if (focusStack.length > 0) {
      e.preventDefault();
      closeTopFocus();
      return;
    }
  }

  /* 没有任何 overlay 打开才处理页面导航 */
  if (anyOverlayOpen()) return;

  /* Page 1: ↓ opens menu */
  if (currentPage === 0 && key === 'ArrowDown') { e.preventDefault(); openMenu(); return; }

  /* Page 1: Enter to advance */
  if (key === 'Enter' && currentPage === 0) {
    e.preventDefault();
    if (!transitioned) doTransition();
    else if (transitionDone) goToPage(1);
    return;
  }

  /* Page 2: Enter opens current project */
  if (key === 'Enter' && currentPage === 1) { e.preventDefault(); openProject(getProjectCur()); return; }

  /* Page 9: Enter opens about */
  if (key === 'Enter' && currentPage === 8) { e.preventDefault(); if (finalDone) openSheet('about'); return; }

  /* Vertical page nav */
  if ((key === 'ArrowUp' || key === 'w' || key === 'W') && currentPage > 0) { e.preventDefault(); tryPageNav(-1); return; }
  if ((key === 'ArrowDown' || key === 's' || key === 'S') && currentPage > 0) { e.preventDefault(); tryPageNav(1); return; }

  /* Horizontal item nav */
  const left  = key === 'ArrowLeft'  || key === 'a' || key === 'A';
  const right = key === 'ArrowRight' || key === 'd' || key === 'D';
  if (!left && !right) return;
  e.preventDefault();
  const dir = left ? -1 : 1;
  switch (currentPage) {
    case 1: stopProjectByUser(); goProjectSlide(getProjectCur() + dir); break;
    case 2:
      if (left) {
        if (!isListMode) enterListMode();
        else if (listCur === 0) enterStackMode();
        else { listCur = Math.max(0, listCur - 1); updateProgress(listCur); applyListPositions(); listUserStopped = true; clearInterval(listAutoTimer); }
      } else {
        if (!isListMode) enterListMode();
        else { listCur = Math.min(STACK_COUNT - 1, listCur + 1); updateProgress(listCur); applyListPositions(); listUserStopped = true; clearInterval(listAutoTimer); }
      }
      break;
    case 3: {
      const ni = Math.max(0, Math.min(docFiles.length - 1, docCurIdx + dir));
      scrollTabToCenter(ni); loadDoc(ni); break;
    }
    case 4: stopBlogByUser(); goBlog(blogCarouselCtrl.getCur() + dir); break;
    case 5: stopEventByUser(); goEvent(eventCarouselCtrl.getCur() + dir); break;
    case 6: stopMemberByUser(); goMember(memberCur + dir, false); break;
  }
});
